name: Watch Releases

on:
  schedule:
    - cron: "0 */1 * * *"  # Every 1 hours
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Force notify even if release tag is same"
        required: false
        default: false
        type: boolean
      debug_session:
        description: 'Run tmate debug session'
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-watcher:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oNaiPs/secrets-to-env-action@75f319b3c8c926ac2eabcca34daa6cf531daf32f # v1.8
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Set FORCE_NOTIFY env
        run: |
          if [[ "${{ github.event.inputs.force_notify }}" == "true" ]]; then
            echo 'FORCE_NOTIFY=1' >> $GITHUB_ENV
          fi

      - name: Populate env file
        run: printenv | sed 's/=/="/; s/$/"/' > .env.empty

      - name: Setup tmate session
        if: github.event.inputs.debug_session == 'true'
        uses: mxschmitt/action-tmate@35b54afac29c97fb54faba5b513f8fbd1882f113 # v3.24

      - name: Run Release Watcher
        if: github.event.inputs.debug_session != 'true'
        run: docker compose up --build --abort-on-container-exit
